      <div class="custom-macro-grid">
        <div class="custom-field"><label>kcal</label><input type="number" min="0" placeholder="—" value="${customDraft.kcal}" oninput="customDraft.kcal=this.value"></div>
        <div class="custom-field"><label>Prot</label><input type="number" min="0" placeholder="—" value="${customDraft.protein}" oninput="customDraft.protein=this.value"></div>
        <div class="custom-field"><label>Carbs</label><input type="number" min="0" placeholder="—" value="${customDraft.carbs}" oninput="customDraft.carbs=this.value"></div>
        <div class="custom-field"><label>Fat</label><input type="number" min="0" placeholder="—" value="${customDraft.fat}" oninput="customDraft.fat=this.value"></div>
      </div>
      <div class="custom-actions">
        <button class="custom-add-btn" onclick="addCustomItem('${nutriDate}','${key}')">＋ Add</button>
        <button class="custom-cancel-btn" onclick="openCustomPanel('${key}')">Cancel</button>
      </div>
    </div>`:'';

    return`<div class="nmeal-card">
      <div class="nmeal-hdr">
        <div class="nmeal-hdr-left">
          <span class="nmeal-icon">${icon}</span>
          <span class="nmeal-title">${label}</span>
          ${d.name?`<span class="nmeal-subtitle">— ${d.name}</span>`:''}
        </div>
      </div>
      <div class="nmeal-presets">${presetChips}
        <button class="preset-chip${isCustomActive?' on':''}" onclick="clearNutriMeal('${nutriDate}','${key}')">Custom</button>
        <button class="custom-add-chip${panelOpen?' on':''}" onclick="openCustomPanel('${key}')">＋ Add</button>
        ${mealPickerHTML}
      </div>
      ${customPills?`<div class="nmeal-customs">${customPills}</div>`:''}
      ${customPanel}
      <div class="nmeal-body">
        <div class="nmeal-name-row nfield-name">
          <label>What</label>
          <input type="text" placeholder="or type custom..." value="${d.name||''}" oninput="saveNutriField('${key}','name',this.value)">
        </div>
        <div class="nmeal-macros">
          <div class="nfield"><label>kcal</label><input type="number" min="0" placeholder="—" value="${d.kcal||''}" oninput="saveNutriField('${key}','kcal',+this.value)"></div>
          <div class="nfield"><label>Prot</label><input type="number" min="0" placeholder="—" value="${d.protein||''}" oninput="saveNutriField('${key}','protein',+this.value)"></div>
          <div class="nfield"><label>Carbs</label><input type="number" min="0" placeholder="—" value="${d.carbs||''}" oninput="saveNutriField('${key}','carbs',+this.value)"></div>
          <div class="nfield"><label>Fat</label><input type="number" min="0" placeholder="—" value="${d.fat||''}" oninput="saveNutriField('${key}','fat',+this.value)"></div>
        </div>
      </div>
    </div>`;
  });

  // Dinner card
  const manualDinner=dayData.dinner||{};
  const isOut=S.out?.[nutriDate];
  const dinnerCard=`<div class="nmeal-card">
    <div class="nmeal-hdr">
      <div class="nmeal-hdr-left">
        <span class="nmeal-icon">🍽</span>
        <span class="nmeal-title">Dinner</span>
        ${dinner?`<span class="nmeal-subtitle">— ${dinner.name}</span>`:isOut?`<span class="nmeal-subtitle" style="color:var(--gold)">— eating out</span>`:''}
      </div>
      <button class="btn-clr" style="font-size:11px;padding:4px 9px" onclick="openDayMod('${nutriDate}')">${dinner?'Change':'Assign meal'}</button>
    </div>
    ${dinner&&dinner.nutrition
      ?`<div class="nmeal-dinner-body"><div class="ndinner-macros">
          <span class="ndinner-macro">${dinner.nutrition.kcal} kcal</span>
          <span class="ndinner-macro">${dinner.nutrition.protein}g protein</span>
          <span class="ndinner-macro">${dinner.nutrition.carbs}g carbs</span>
          <span class="ndinner-macro">${dinner.nutrition.fat}g fat</span>
        </div></div>`
      :`<div class="nmeal-body">
          <div class="nmeal-name-row nfield-name">
            <label>What</label>
            <input type="text" placeholder="e.g. Pizza Napoli…" value="${manualDinner.name||''}" oninput="saveNutriField('dinner','name',this.value)">
          </div>
          <div class="nmeal-macros">
            <div class="nfield"><label>kcal</label><input type="number" min="0" placeholder="—" value="${manualDinner.kcal||''}" oninput="saveNutriField('dinner','kcal',+this.value)"></div>
            <div class="nfield"><label>Prot</label><input type="number" min="0" placeholder="—" value="${manualDinner.protein||''}" oninput="saveNutriField('dinner','protein',+this.value)"></div>
            <div class="nfield"><label>Carbs</label><input type="number" min="0" placeholder="—" value="${manualDinner.carbs||''}" oninput="saveNutriField('dinner','carbs',+this.value)"></div>
            <div class="nfield"><label>Fat</label><input type="number" min="0" placeholder="—" value="${manualDinner.fat||''}" oninput="saveNutriField('dinner','fat',+this.value)"></div>
          </div>
        </div>`
    }
  </div>`;

  container.innerHTML=[...cards,dinnerCard].join('');
}

function applyPreset(date,meal,preset){
  if(!S.nutrition)S.nutrition={};
  if(!S.nutrition[date])S.nutrition[date]={};
  const cur=S.nutrition[date][meal]||{};
  const picks=[...(cur._picks||[])];
  const qtys={...(cur._qtys||{})};
  const idx=picks.indexOf(preset.name);
  if(idx>=0){picks.splice(idx,1);delete qtys[preset.name];}
  else{picks.push(preset.name);qtys[preset.name]=1;}
  if(picks.length===0&&!(cur._customs||[]).length){delete S.nutrition[date][meal];}
  else{recomputeFromPicks(date,meal,picks,qtys,cur._customs||[]);}
  saveNutriStore();renderNutri();
}

function recomputeFromPicks(date,meal,picks,qtys,customs){
  const all=[...MEAL_PRESETS.breakfasts,...MEAL_PRESETS.lunches,...MEAL_PRESETS.snacks,...MEAL_PRESETS.drinks];
  const selected=picks.map(n=>all.find(p=>p.name===n)).filter(Boolean);
  let sum=selected.reduce((a,p)=>{
    const q=qtys[p.name]||1;
    return{kcal:a.kcal+(p.kcal||0)*q,protein:a.protein+(p.protein||0)*q,carbs:a.carbs+(p.carbs||0)*q,fat:a.fat+(p.fat||0)*q};
  },{kcal:0,protein:0,carbs:0,fat:0});
  (customs||[]).forEach(c=>{
    sum.kcal+=(c.kcal||0);sum.protein+=(c.protein||0);sum.carbs+=(c.carbs||0);sum.fat+=(c.fat||0);
  });
  const nameParts=[
    ...selected.map(p=>(qtys[p.name]||1)>1?`${p.name} ×${qtys[p.name]}`:p.name),
    ...(customs||[]).map(c=>c.name||'Custom')
  ];
  S.nutrition[date][meal]={name:nameParts.join(' + '),...sum,_picks:picks,_qtys:qtys,_customs:customs||[]};
}

function openCustomPanel(meal){
  customPanelSlot=customPanelSlot===meal?null:meal;
  if(customPanelSlot)customDraft={name:'',kcal:'',protein:'',carbs:'',fat:''};
  renderNutri();
}

function addCustomItem(date,meal){
  const kcal=parseFloat(customDraft.kcal)||0;
  const protein=parseFloat(customDraft.protein)||0;
  const carbs=parseFloat(customDraft.carbs)||0;
  const fat=parseFloat(customDraft.fat)||0;
  if(!kcal&&!protein&&!carbs&&!fat)return;
  if(!S.nutrition)S.nutrition={};
  if(!S.nutrition[date])S.nutrition[date]={};
  const cur=S.nutrition[date][meal]||{};
  const customs=[...(cur._customs||[]),{name:customDraft.name||'Custom',kcal,protein,carbs,fat}];
  recomputeFromPicks(date,meal,cur._picks||[],cur._qtys||{},customs);
  customDraft={name:'',kcal:'',protein:'',carbs:'',fat:''};
  customPanelSlot=null;
  saveNutriStore();renderNutri();
}

function removeCustomItem(date,meal,idx){
  const cur=S.nutrition?.[date]?.[meal];
  if(!cur?._customs)return;
  cur._customs.splice(idx,1);
  recomputeFromPicks(date,meal,cur._picks||[],cur._qtys||{},cur._customs);
  saveNutriStore();renderNutri();
}

function cyclePreset(date,meal,name){
  const cur=S.nutrition?.[date]?.[meal];
  if(!cur?._picks?.includes(name))return;
  if(!cur._qtys)cur._qtys={};
  const q=cur._qtys[name]||1;
  cur._qtys[name]=q>=5?1:q+1;
  recomputeFromPicks(date,meal,cur._picks,cur._qtys,cur._customs||[]);
  saveNutriStore();renderNutri();
}

function clearNutriMeal(date,meal){
  if(S.nutrition?.[date]?.[meal])delete S.nutrition[date][meal];
  saveNutriStore();renderNutri();
}
function saveNutriField(meal,field,val){
  if(!S.nutrition)S.nutrition={};
  if(!S.nutrition[nutriDate])S.nutrition[nutriDate]={};
  if(!S.nutrition[nutriDate][meal])S.nutrition[nutriDate][meal]={};
  S.nutrition[nutriDate][meal][field]=val;
  saveNutriStore();
  // Lightweight update — only refresh rings + achievements without re-rendering all cards
  const dayData=S.nutrition[nutriDate]||{};
  const dinner=S.plan[nutriDate]?MEALS.find(m=>m.id===S.plan[nutriDate]):null;
  const totals=calcDailyTotals(dayData,dinner);
  renderNutriProgress(totals);
  renderWeekStrip();
  renderAchievements(totals,calcStreak());
}

function saveNutriStore(){
  localStorage.setItem('cenas_nutrition',JSON.stringify(S.nutrition||{}));
  maybeDailyBackup();
  if(document.getElementById('mcalModal')?.style.display!=='none') renderMcal();
}

function loadNutri(){
  try{const d=localStorage.getItem('cenas_nutrition');if(d)S.nutrition=JSON.parse(d);}catch(e){}
  if(!S.nutrition)S.nutrition={};
}

/* ---- NUTRITION BACKUP (local-only with daily cloud backup) ---- */
async function maybeDailyBackup(){
  const last=parseInt(localStorage.getItem('cenas_nutrition_lastBackup')||'0');
  if(Date.now()-last<86400000)return; // less than 24h ago — skip
  try{
    const payload=JSON.stringify({nutrition:S.nutrition||{},backedUpAt:Date.now()});
    const res=await fetch(AH_PROXY+'/sync-nutrition',{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
    if(res.ok)localStorage.setItem('cenas_nutrition_lastBackup',Date.now());
  }catch(e){/* silent — it's just a backup */}
}

async function restoreNutritionBackup(){
  const btn=document.getElementById('nutriRestoreBtn');
  if(btn){btn.textContent='Restoring…';btn.disabled=true;}
  try{
    const res=await fetch(AH_PROXY+'/sync-nutrition');
    if(!res.ok)throw new Error();
    const cloud=await res.json();
    if(!cloud.nutrition||!Object.keys(cloud.nutrition).length){
      showToast('No backup found in cloud');
      if(btn){btn.textContent='Restore backup';btn.disabled=false;}
      return;
    }
    // Merge: local wins for keys that exist, cloud fills in the rest
    S.nutrition={...cloud.nutrition,...S.nutrition};
    localStorage.setItem('cenas_nutrition',JSON.stringify(S.nutrition));
    const d=new Date(cloud.backedUpAt);
    const lbl=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    showToast(`Nutrition restored from ${lbl} ✓`);
    renderNutri();
  }catch(e){
    showToast('Restore failed — check connection');
  }finally{
    if(btn){btn.textContent='Restore backup';btn.disabled=false;}
  }
}

/* ---- INIT ---- */
load();loadPrices();loadNutri();renderFbar();renderGrid();renderWidget();loadFromCloud();setInterval(pollCloud, 120000);
</script>
