<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinners at home</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dinners">
<meta name="theme-color" content="#c8943a">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ef;
  --bg2:#ffffff;
  --surface:#ffffff;
  --surface2:#f2ede6;
  --border:#e2d9ce;
  --border2:#cec4b6;
  --gold:#b8721e;
  --gold-dim:rgba(184,114,30,.1);
  --terra:#b84830;
  --terra-dim:rgba(184,72,48,.1);
  --sage:#3a8c36;
  --sage-dim:rgba(58,140,54,.1);
  --text:#28211a;
  --muted:#8a7e6e;
  --faint:#c4b8a8;
  --r:10px;--rs:6px
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;font-size:15px;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{max-width:980px;margin:0 auto;padding:0 18px 100px}

/* HEADER */
.hdr{padding:32px 0 20px;display:flex;align-items:baseline;gap:10px}
.hdr h1{font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.4px}
.hdr h1 em{font-style:italic;font-weight:300;color:var(--gold)}
.hdr-sub{margin-left:auto;font-size:12px;color:var(--muted)}

/* SYNC */
.sync-banner{display:none;background:var(--gold-dim);border:1px solid var(--gold);border-radius:var(--rs);padding:9px 14px;margin-bottom:14px;font-size:13px;color:var(--gold);cursor:pointer;transition:all .15s;text-align:center}
.sync-banner:hover{background:var(--gold);color:#fff}
/* SYNC */
.sync-dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:background .3s;flex-shrink:0;margin-left:4px;align-self:center}
.sync-dot.syncing{background:#e8a020;box-shadow:0 0 0 3px rgba(232,160,32,.2)}
.sync-dot.synced{background:var(--sage)}
.sync-dot.error{background:var(--terra)}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--surface);padding:4px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:22px}
.tab{flex:1;padding:8px 0;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;letter-spacing:.2px;cursor:pointer;border-radius:var(--rs);transition:all .18s;text-align:center}
.tab:hover{color:var(--text)}
.tab.on{background:var(--surface2);color:var(--gold);border:1px solid var(--border)}

/* FILTER BAR */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--gold);color:var(--text)}
.chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.fbar-div{width:1px;background:var(--border);height:20px;margin:0 2px}

/* MEAL GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:0;transition:opacity .18s}
.mc:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.mc:hover::after{opacity:1}
.mc-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.3}
.mc-ingr{font-size:12px;color:var(--muted);margin-bottom:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mc-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mc-last{font-size:11px;color:var(--faint);margin-top:7px}
.nutri-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.ntag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;letter-spacing:.2px}
.ntag-protein{background:rgba(58,140,54,.12);color:#2d7a29}
.ntag-lowcal{background:rgba(58,140,54,.12);color:#2d7a29}
.ntag-carbs{background:rgba(200,148,58,.12);color:#a06b10}
.ntag-fat{background:rgba(138,106,154,.12);color:#6a3f7a}
.ntag-balanced{background:rgba(40,33,26,.07);color:var(--muted)}
.ntag-heavy{background:rgba(192,88,48,.12);color:#b84020}
.bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;letter-spacing:.2px}
.bdg-t{background:var(--surface2);color:var(--muted)}
.bdg-low{background:var(--sage-dim);color:var(--sage)}
.bdg-mid{background:var(--gold-dim);color:var(--gold)}
.bdg-high{background:var(--terra-dim);color:var(--terra)}
.yummy{margin-left:auto;font-size:12px;color:var(--gold);font-weight:500}

/* WEEK */
.whdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.wnav{display:flex;align-items:center;gap:10px}
.wnav button{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:var(--rs);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.wnav button:hover{border-color:var(--gold);color:var(--gold)}
.wlbl{font-size:13px;color:var(--muted);min-width:170px;text-align:center}
.wlbl strong{color:var(--text)}
.btn-auto{padding:7px 14px;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-auto:hover{background:var(--gold);color:var(--bg)}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
@media(max-width:680px){.wgrid{grid-template-columns:1fr}}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;min-height:115px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:border-color .18s}
.dc.out{background:var(--surface2);opacity:.6}
.dc-out-lbl{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--muted);font-size:12px}
.dc:hover{border-color:var(--gold)}
.dc.today{border-color:var(--gold)}
.dc.today .dname{color:var(--gold)}
.dname{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.ddate{font-size:18px;font-family:'Fraunces',serif;line-height:1}
.dmeal{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.dmeal-name{font-size:12px;font-weight:500;line-height:1.3}
.dmeal-bdgs{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.dempty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:20px;border:1px dashed var(--border);border-radius:var(--rs);transition:all .15s}
.dc:hover .dempty{border-color:var(--gold);color:var(--gold)}
.btn-rm{font-size:11px;color:var(--faint);background:none;border:none;cursor:pointer;padding:0;transition:color .15s;line-height:1}
.btn-rm:hover{color:var(--terra)}
.dc-hdr{display:flex;align-items:flex-start;justify-content:space-between}

/* LISTA */
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.lhdr h2{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.btn-clr{padding:6px 13px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-clr:hover{border-color:var(--terra);color:var(--terra)}
.lempty{text-align:center;padding:55px 0;color:var(--muted)}
.lempty p{margin-bottom:6px}.lempty small{color:var(--faint);font-size:13px}
.msec{margin-bottom:18px}
.msec-ttl{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}

.btn-ah{padding:7px 14px;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ah:hover{background:var(--gold);color:#fff}
.btn-ah:disabled{opacity:.5;cursor:not-allowed}
.ah-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.ah-err{background:var(--terra-dim);border:1px solid var(--terra);color:var(--terra);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px;line-height:1.5}
.ah-err a{color:var(--terra);font-weight:500}
.price-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.price-found{background:var(--sage-dim);color:var(--sage)}
.price-bonus{background:rgba(220,80,30,.12);color:#c04020}
.price-loading{background:var(--surface2);color:var(--muted);animation:pulse 1.2s infinite}
.price-miss{background:var(--surface2);color:var(--faint)}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.ah-total{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.ah-total-lbl{font-size:13px;color:var(--muted)}
.ah-total-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--gold)}
.iitem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.ingr-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.ingr-meals{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ingr-qty{font-size:11px;font-weight:600;color:var(--gold);background:var(--gold-dim);padding:1px 5px;border-radius:4px;margin-left:4px}

.iitem:last-child{border-bottom:none}
.iitem.ckd{opacity:.35}
.iitem input[type=checkbox]{appearance:none;width:15px;height:15px;border:1px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;position:relative;transition:all .15s}
.iitem input[type=checkbox]:checked{background:var(--gold);border-color:var(--gold)}
.iitem input[type=checkbox]:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:var(--bg);font-weight:700}
.ilbl{font-size:14px}.ilbl.ckd{text-decoration:line-through;color:var(--muted)}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(40,33,26,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.moverlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-bottom:none;border-radius:var(--r) var(--r) 0 0;width:100%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;transform:translateY(24px);transition:transform .22s}
.moverlay.open .modal{transform:translateY(0)}
.mhdr{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.mhdr h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600}
.mclose{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;line-height:1;transition:color .15s}
.mclose:hover{color:var(--text)}
.mfbar{padding:10px 18px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.mlist{overflow-y:auto;padding:10px 18px;display:flex;flex-direction:column;gap:7px}
.mitem{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .15s}
.mitem:hover{border-color:var(--gold);background:var(--gold-dim)}
.mitem.sel{border-color:var(--gold);background:var(--gold-dim)}
.mitem-name{font-size:13px;font-weight:500;flex:1;line-height:1.3}
.mitem-bdgs{display:flex;gap:5px;align-items:center;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-new{background:var(--sage)}.dot-mid{background:var(--gold)}.dot-old{background:var(--faint)}
.week-note{font-size:11px;color:var(--faint);margin-top:1px}


/* PRICES TAB */
.p-section{margin-bottom:28px}
.p-section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.p-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.p-item:last-child{border-bottom:none}
.p-name{flex:1;font-size:14px}
.p-input{width:72px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:13px;text-align:right;background:var(--surface2);color:var(--text);transition:border-color .15s}
.p-input:focus{outline:none;border-color:var(--gold)}
.p-bonus{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap;background:transparent}
.p-bonus.on{background:var(--terra-dim);border-color:var(--terra);color:var(--terra)}
.p-bonus:hover{border-color:var(--terra);color:var(--terra)}
.p-save{padding:8px 18px;background:var(--gold);border:none;color:#fff;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.p-save:hover{opacity:.85}
.price-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;margin-left:auto;flex-shrink:0;white-space:nowrap;text-decoration:none}
.price-found{background:var(--sage-dim);color:var(--sage)}
.price-bonus{background:var(--terra-dim);color:var(--terra)}
.price-miss{background:var(--surface2);color:var(--faint)}
.ah-total{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.ah-total-lbl{font-size:13px;color:var(--muted)}
.ah-total-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--gold)}


/* CALENDAR FLOAT BUTTON */
.cal-fab{position:fixed;bottom:22px;left:22px;width:46px;height:46px;border-radius:50%;background:var(--gold);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.15);z-index:50;transition:transform .15s}
.cal-fab:hover{transform:scale(1.08)}

/* CALENDAR OVERLAY */
.cal-overlay{position:fixed;inset:0;background:rgba(40,33,26,.55);backdrop-filter:blur(3px);z-index:110;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.cal-overlay.open{opacity:1;pointer-events:all}
.cal-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:min(680px,96vw);max-height:90vh;display:flex;flex-direction:column;transform:scale(.97);transition:transform .2s;overflow:hidden}
.cal-overlay.open .cal-modal{transform:scale(1)}
.cal-mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-mhdr h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);border-radius:var(--rs);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav button:hover{border-color:var(--gold);color:var(--gold)}
.cal-month-lbl{font-size:14px;font-weight:500;min-width:140px;text-align:center}
.cal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.cal-close:hover{color:var(--text)}
.cal-body{overflow-y:auto;padding:16px 20px 20px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dow span{font-size:11px;font-weight:600;text-align:center;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{border:1px solid var(--border);border-radius:var(--rs);padding:6px 6px 5px;min-height:64px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;background:var(--surface)}
.cal-day:hover{border-color:var(--gold)}
.cal-day.today{border-color:var(--gold)}
.cal-day.today .cal-dn{color:var(--gold);font-weight:600}
.cal-day.other-month{opacity:.35}
.cal-day.has-meal{background:var(--surface2)}
.cal-dn{font-size:13px;font-weight:400;line-height:1}
.cal-meal-chip{font-size:10px;color:var(--gold);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-weight:500}
.cal-empty-dot{width:6px;height:6px;border-radius:50%;border:1px dashed var(--faint);margin-top:auto;align-self:center}


/* TODAY WIDGET */
.today-widget{position:fixed;bottom:22px;right:22px;z-index:50;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.12);overflow:hidden;transition:all .25s}
.today-widget.dismissed{opacity:0;pointer-events:none;transform:translateY(8px)}
.tw-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 0}
.tw-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.tw-close{background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;line-height:1;padding:0}
.tw-close:hover{color:var(--muted)}
.tw-body{padding:8px 12px 10px;display:flex;flex-direction:column;gap:6px}
.tw-meal{display:flex;align-items:center;gap:8px}
.tw-emoji{font-size:22px;line-height:1;flex-shrink:0}
.tw-name{font-family:'Fraunces',serif;font-size:14px;font-weight:600;line-height:1.25;color:var(--text)}
.tw-meta{font-size:11px;color:var(--muted)}
.tw-actions{display:flex;gap:5px;margin-top:2px}
.tw-btn{flex:1;padding:5px 0;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;text-align:center}
.tw-btn:hover{border-color:var(--gold);color:var(--gold)}
.tw-btn.primary{background:var(--gold);border-color:var(--gold);color:#fff}
.tw-btn.primary:hover{opacity:.88}
.tw-planned{font-size:11px;color:var(--sage);font-weight:500;margin-top:1px}


/* DETAIL MODAL */
.detail-hero{padding:22px 20px 14px;border-bottom:1px solid var(--border)}
.detail-emoji{font-size:40px;line-height:1;margin-bottom:8px}
.detail-name{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.2;margin-bottom:10px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.detail-section{padding:14px 20px;border-bottom:1px solid var(--border)}
.detail-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px}
.detail-ingr-list{display:flex;flex-direction:column;gap:6px}
.detail-ingr-row{display:flex;align-items:center;justify-content:space-between;font-size:14px}
.nutri-bars{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.nutri-row{display:flex;flex-direction:column;gap:4px}
.nutri-row-hdr{display:flex;justify-content:space-between;align-items:baseline}
.nutri-row-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.nutri-row-val{font-size:12px;color:var(--text);font-weight:500}
.nutri-row-pct{font-size:11px;color:var(--muted)}
.nutri-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.nutri-bar{height:100%;border-radius:4px;transition:width .4s ease}
.nutri-ref{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.15);border-radius:1px}
.bar-good{background:var(--sage)}
.bar-warn{background:var(--gold)}
.bar-bad{background:var(--terra)}
.detail-ingr-name{color:var(--text)}
.detail-ingr-price{color:var(--muted);font-size:13px}
.detail-total{display:flex;justify-content:space-between;align-items:center;padding:14px 20px}
.detail-total-lbl{font-size:13px;color:var(--muted)}
.detail-total-val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--gold)}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border)}
.detail-stat{background:var(--surface2);border-radius:var(--rs);padding:10px 12px}
.detail-stat-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.detail-stat-val{font-size:16px;font-weight:500}
.detail-plan-btn{margin:14px 20px;width:calc(100% - 40px);padding:11px;background:var(--gold);border:none;color:#fff;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.detail-plan-btn:hover{opacity:.88}


/* NUTRITION TAB */
.nmeal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.nmeal-presets{padding:8px 12px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border);background:var(--bg)}
.preset-chip{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.preset-chip:hover{border-color:var(--gold);color:var(--gold)}
.preset-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-weight:500}
.nmeal-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2)}
.nmeal-hdr-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.nmeal-icon{font-size:17px;flex-shrink:0}
.nmeal-title{font-size:13px;font-weight:600;flex-shrink:0}
.nmeal-subtitle{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Name row full-width, then macros in 2x2 grid */
.nmeal-body{padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nmeal-name-row{grid-column:1/-1}
.nmeal-dinner-body{padding:11px 14px}
.nfield{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--rs);padding:8px 10px;border:1px solid var(--border)}
.nfield label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);flex-shrink:0;width:52px}
.nfield input{border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;color:var(--text);text-align:right;flex:1;min-width:0;padding:0}
.nfield input:focus{outline:none}
.nfield input::placeholder{color:var(--faint)}
.nfield-name{background:transparent;border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;display:flex;align-items:center;gap:8px}
.nfield-name label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);flex-shrink:0}
.nfield-name input{border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);flex:1;min-width:0;padding:0}
.nfield-name input:focus{outline:none}
.ndinner-macros{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ndinner-macro{font-size:13px;background:var(--surface2);padding:7px 10px;border-radius:var(--rs);color:var(--text);display:flex;justify-content:space-between;align-items:center}
.ndinner-macro-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.ndinner-empty{font-size:13px;color:var(--faint);font-style:italic;padding:4px 0}
.ntotals{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.ntotals-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:14px}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);border:1px solid transparent;color:#faf6f0;padding:9px 16px;border-radius:var(--rs);font-size:13px;opacity:0;transition:all .2s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.tc{display:none}.tc.on{display:block}
.no-results{color:var(--muted);padding:16px 0;font-size:14px}

/* ===== NUTRITION GAMIFICATION ===== */
.nutri-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(220,88,24,.1);border:1px solid rgba(220,88,24,.3);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:#c84c10;white-space:nowrap;flex-shrink:0;transition:all .2s}
.streak-badge.zero{background:var(--surface2);border-color:var(--border);color:var(--muted)}

/* Progress card */
.nutri-progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:center}
.nutri-main-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.ring-main-val{font-family:'Fraunces',serif;font-size:23px;font-weight:600;line-height:1}
.ring-main-lbl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.2px}
.ring-remaining{font-size:11px;margin-top:4px;font-weight:500}
.daily-grade-badge{position:absolute;bottom:-3px;right:-3px;width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2.5px solid var(--bg)}
.grade-s{background:#2d7a29;color:#fff}
.grade-a{background:var(--sage);color:#fff}
.grade-b{background:var(--gold);color:#fff}
.grade-c{background:#b87820;color:#fff}
.grade-d{background:var(--terra);color:#fff}
.grade-f{background:var(--muted);color:#fff}
.grade-none{background:var(--surface2);color:var(--faint);border-color:var(--border)}

/* Macro rings */
.nutri-macro-rings{flex:1;display:flex;flex-direction:column;gap:7px}
.macro-ring-row{display:flex;align-items:center;gap:10px}
.macro-mini-ring{position:relative;width:44px;height:44px;flex-shrink:0}
.macro-mini-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;pointer-events:none}
.macro-ring-info{flex:1;min-width:0}
.macro-ring-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.macro-ring-val{font-size:13px;font-weight:600;line-height:1.2}
.macro-ring-sub{font-size:10px;color:var(--faint);margin-top:1px}

/* Week strip */
.week-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-end}
.wstrip-day{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;cursor:default}
.wstrip-dot{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);transition:all .2s;position:relative}
.wstrip-dot.s-none{background:var(--surface2);border-color:var(--border)}
.wstrip-dot.s-bad{background:rgba(184,72,48,.12);border-color:var(--terra)}
.wstrip-dot.s-ok{background:rgba(184,114,30,.12);border-color:var(--gold)}
.wstrip-dot.s-good{background:rgba(58,140,54,.15);border-color:var(--sage)}
.wstrip-dot.s-great{background:var(--sage);border-color:var(--sage)}
.wstrip-lbl{font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--muted);text-transform:uppercase}
.wstrip-day.today .wstrip-lbl{color:var(--gold)}
.wstrip-day.today .wstrip-dot{box-shadow:0 0 0 3px rgba(184,114,30,.18);border-color:var(--gold)}
.wstrip-day.active-nav .wstrip-dot::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold)}

/* Achievements */
.nutri-achievements{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ach{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;animation:achpop .22s ease both}
.ach-green{background:rgba(58,140,54,.1);border-color:rgba(58,140,54,.3);color:#2d7a29}
.ach-gold{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.ach-fire{background:rgba(220,88,24,.1);border-color:rgba(220,88,24,.3);color:#c84c10}
.ach-purple{background:rgba(138,80,160,.1);border-color:rgba(138,80,160,.3);color:#7a3e9a}
@keyframes achpop{from{transform:scale(.8) translateY(4px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Meal picker in lunch */
.meal-picker-btn{border-color:var(--gold)!important;color:var(--gold)!important}
.meal-picker-btn.on{background:var(--gold-dim)!important}
.meal-picker-panel{display:flex;flex-wrap:wrap;gap:6px;width:100%;margin-top:6px;padding-top:8px;border-top:1px solid var(--border)}

.mpicker-chip:hover{border-color:var(--gold);color:var(--gold)}
.mpicker-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
</style>

function save(){
  const now = Date.now();
  localStorage.setItem('cenas2',JSON.stringify({plan:S.plan,ckd:S.ckd,lc:S.lc,manual:S.manual,out:S.out}));
  localStorage.setItem('cenas_updatedAt', now);
  syncToCloud();
}

function wkDates(off=0){
  const t=new Date();t.setHours(0,0,0,0);
  const d=t.getDay();const mon=new Date(t);
  mon.setDate(t.getDate()-(d===0?6:d-1)+off*7);
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x});
}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function isToday(d){return dk(d)===dk(new Date())}
function daysSince(s){if(!s)return 9999;return Math.floor((new Date()-new Date(s))/86400000)}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

function setTab(t){
  S.tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['r','s','l','p','n'][i]===t));
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('on'));
  document.getElementById('tc-'+t).classList.add('on');
  if(t==='r'){renderFbar();renderGrid()}
  if(t==='s'){renderWeek()}
  if(t==='l'){renderList()}
  if(t==='p'){renderPrices()}
  if(t==='n'){renderNutri()}
  updateHdr();
}

function updateHdr(){
  const el=document.getElementById('hdrSub');
  if(S.tab==='s'){
    const ds=wkDates(S.wk);const n=ds.filter(d=>S.plan[dk(d)]).length;
    el.textContent=`${n}/7 dinners planned`;
  }else{el.textContent=''}
}

/* ---- RECETARIO ---- */
function fMeals(){
  return MEALS.filter(m=>{
    if(S.tf.t==='q'&&m.t>20)return false;
    if(S.tf.t==='m'&&m.t>30)return false;
    if(S.tf.t==='sl'&&m.t<=30)return false;
    if(S.tf.c!=='all'&&getMealCat(m)!==S.tf.c)return false;
    if(S.ntf&&S.ntf!=='all'){
      const tags=getNutriTagKeys(m);
      if(!tags.includes(S.ntf))return false;
    }
    return true;
  });
}

function getNutriTagKeys(m){
  if(!m.nutrition)return['Balanced'];
  const {kcal,protein}=m.nutrition;
  const tags=[];
  if(protein>=40)tags.push('High protein');
  else if(protein>=30)tags.push('Good protein');
  if(kcal<450)tags.push('Light');
  if(kcal>=750)tags.push(kcal+' kcal');
  if(m.nutrition.carbs>=70)tags.push('Carb-heavy');
  if(m.nutrition.fat>=40)tags.push('Fat-heavy');
  if(!tags.length)tags.push('Balanced');
  return tags;
}
function renderFbar(){
  const b=document.getElementById('fbar');
  const tF=[{k:'all',l:'All'},{k:'q',l:'≤ 20 min'},{k:'m',l:'≤ 30 min'},{k:'sl',l:'+30 min'}];
  const cF=[{k:'all',l:'Any price'},{k:'$',l:'$'},{k:'$$',l:'$$'},{k:'$$$',l:'$$$'}];
  const nF=[{k:'all',l:'Any'},{k:'High protein',l:'High protein'},{k:'Good protein',l:'Good protein'},{k:'Light',l:'Light'},{k:'Carb-heavy',l:'Carb-heavy'},{k:'Fat-heavy',l:'Fat-heavy'},{k:'Balanced',l:'Balanced'}];
  b.innerHTML=
    tF.map(f=>`<button class="chip${S.tf.t===f.k?' on':''}" onclick="setTF('t','${f.k}')">${f.l}</button>`).join('')
    +`<div class="fbar-div"></div>`
    +cF.map(f=>`<button class="chip${S.tf.c===f.k?' on':''}" onclick="setTF('c','${f.k}')">${f.l}</button>`).join('')
    +`<div class="fbar-div"></div>`
    +nF.map(f=>`<button class="chip${(S.ntf||'all')===f.k?' on':''}" onclick="setNF('${f.k}')">${f.l}</button>`).join('');
}
function setTF(k,v){S.tf[k]=v;renderFbar();renderGrid()}
function setNF(v){S.ntf=v;renderFbar();renderGrid()}

function getNutriTags(m){
  if(!m.nutrition)return'';
  const {kcal,protein,carbs,fat}=m.nutrition;
  const tags=[];
  // High protein: >40g
  if(protein>=40)tags.push('<span class="ntag ntag-protein">High protein</span>');
  else if(protein>=30)tags.push('<span class="ntag ntag-protein">Good protein</span>');
  if(kcal<450)tags.push('<span class="ntag ntag-lowcal">Light</span>');
  if(kcal>=750)tags.push('<span class="ntag ntag-heavy">'+kcal+' kcal</span>');
  if(carbs>=70)tags.push('<span class="ntag ntag-carbs">Carb-heavy</span>');
  if(fat>=40)tags.push('<span class="ntag ntag-fat">Fat-heavy</span>');
  if(!tags.length)tags.push('<span class="ntag ntag-balanced">Balanced</span>');
  return'<div class="nutri-tags">'+tags.join('')+'</div>';
}
function renderGrid(){
  const g=document.getElementById('mgrid');
  const meals=fMeals();
  if(!meals.length){g.innerHTML='<p class="no-results">No dishes match these filters.</p>';return}
  g.innerHTML=meals.map(m=>{
    const d=daysSince(S.lc[m.id]);
    const lastTxt=d<9999?`<div class="mc-last">Last cooked ${d} days ago</div>`:'';
    return`<div class="mc" onclick="openMealDetail(${m.id})">
      <div class="mc-name">${m.emoji||''} ${m.name}</div>
      <div class="mc-ingr">${m.ingr.join(', ')}</div>
      <div class="mc-foot">
        <span class="bdg bdg-t">⏱ ${m.t}min</span>
        <span class="bdg bdg-${getMealCat(m)==='$$$'?'high':getMealCat(m)==='$$'?'mid':'low'}">${getMealCat(m)}</span>
        ${(()=>{const p=getMealPrice(m);const cls=getMealCat(m)==='$$$'?'high':getMealCat(m)==='$$'?'mid':'low';return p?`<span class="bdg bdg-${cls}">~€${p.toFixed(2)}</span>`:''})()}
        <span class="yummy">★ ${m.y}</span>
      </div>${lastTxt}
      ${getNutriTags(m)}
    </div>`;
  }).join('');
}
function openMealDetail(id){
  const m=MEALS.find(x=>x.id===id);
  if(!m)return;
  const lastD=lastCookedDate(m.id)||S.lc[m.id];
  const days=daysSince(lastD);
  const lastTxt=days<9999?days+' days ago':'Never';
  const costCls=getMealCat(m)==='$$$'?'high':getMealCat(m)==='$$'?'mid':'low';
  const cx='★'.repeat(m.cx)+'☆'.repeat(5-m.cx);
  const totalPrice=getMealPrice(m);
  const ingrRows=m.ingr.map(ing=>{
    const p=getPrice(ing);
    const priceStr=p.price!=null?'€'+p.price.toFixed(2):'—';
    const bonusDot=p.bonus?' <span style="color:var(--terra);font-size:10px">Bonus</span>':'';
    return '<div class="detail-ingr-row"><span class="detail-ingr-name">'+ing+'</span><span class="detail-ingr-price">'+priceStr+bonusDot+'</span></div>';
  }).join('');
  document.getElementById('detailTitle').textContent=m.name;
  document.getElementById('detailBody').innerHTML=
    '<div class="detail-hero">'
      +'<div class="detail-emoji">'+(m.emoji||'')+'</div>'
      +'<div class="detail-name">'+m.name+'</div>'
      +'<div class="detail-badges">'
        +'<span class="bdg bdg-t">⏱ '+m.t+' min</span>'
        +'<span class="bdg bdg-'+costCls+'">'+getMealCat(m)+'</span>'
        +'<span class="bdg bdg-t">★ '+m.y+'/10</span>'
      +'</div></div>'
    +'<div class="detail-stats">'
      +'<div class="detail-stat"><div class="detail-stat-lbl">Complexity</div><div class="detail-stat-val" style="font-size:13px;letter-spacing:1px">'+cx+'</div></div>'
      +'<div class="detail-stat"><div class="detail-stat-lbl">Last cooked</div><div class="detail-stat-val" style="font-size:14px">'+lastTxt+'</div></div>'
    +'</div>'
    +(m.nutrition?(()=>{
    // Absolute dinner ranges (green = ideal, yellow = acceptable, red = too low/high)
    // Ranges based on 60% of daily targets: 1680kcal / 84g protein / 204g carbs / 45g fat
    // Dinner = ~60% of day. Targets: 2800kcal/140g P/300g C/70g F
    const RANGES={
      kcal:   {low:400, okLow:550, okHigh:920, high:1100, max:1300, unit:'kcal', label:'Calories'},
      protein:{low:22,  okLow:32,  okHigh:62,  high:78,   max:100,  unit:'g',   label:'Protein'},
      carbs:  {low:35,  okLow:55,  okHigh:120, high:160,  max:210,  unit:'g',   label:'Carbs'},
      fat:    {low:10,  okLow:16,  okHigh:48,  high:64,   max:88,   unit:'g',   label:'Fat'},
    };
    const macros=[
      {key:'kcal',   val:m.nutrition.kcal},
      {key:'protein',val:m.nutrition.protein},
      {key:'carbs',  val:m.nutrition.carbs},
      {key:'fat',    val:m.nutrition.fat},
    ];
    const rows=macros.map(({key,val})=>{
      const r=RANGES[key];
      const barW=Math.min(val/r.max*100,100);
      const idealW=Math.min(r.okLow/r.max*100,100);
      const idealW2=Math.min(r.okHigh/r.max*100,100);
      const cls=val>=r.okLow&&val<=r.okHigh?'bar-good':val>=r.low&&val<=r.high?'bar-warn':'bar-bad';
      const hint=val<r.low?'Too low':val<r.okLow?'A bit low':val<=r.okHigh?'On target':val<=r.high?'A bit high':'Too high';
      return '<div class="nutri-row">'
        +'<div class="nutri-row-hdr">'
          +'<span class="nutri-row-lbl">'+r.label+'</span>'
          +'<span class="nutri-row-val">'+val+r.unit+' <span class="nutri-row-pct">— '+hint+'</span></span>'
        +'</div>'
        +'<div class="nutri-track">'
          +'<div style="position:absolute;left:'+idealW+'%;right:'+(100-idealW2)+'%;top:0;bottom:0;background:rgba(58,140,54,.12);border-radius:4px"></div>'
          +'<div class="nutri-bar '+cls+'" style="width:'+barW+'%;position:relative;z-index:1"></div>'
        +'</div>'
      +'</div>';
    }).join('');
    return '<div class="nutri-bars">'+rows+'</div>';
  })():'')
+'<div class="detail-section"><div class="detail-section-title">Ingredients</div><div class="detail-ingr-list">'+ingrRows+'</div></div>'
    +'<div class="detail-total"><span class="detail-total-lbl">Estimated cost</span><span class="detail-total-val">'+(totalPrice?'€'+totalPrice.toFixed(2):'—')+'</span></div>'
    +'<button class="detail-plan-btn" onclick="closeDetail();openDayMod(dk(new Date()))">+ Plan for tonight</button>';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(ev){
  if(ev&&ev.target!==document.getElementById('detailOverlay'))return;
  document.getElementById('detailOverlay').classList.remove('open');
}

  const dates=wkDates(S.wk);
  const lbl=document.getElementById('wlbl');
  lbl.innerHTML=`<strong>${fmtDate(dates[0])}</strong> — ${fmtDate(dates[6])}`+(S.wk===0?' <span style="color:var(--gold);font-size:11px">• today</span>':'');

    const key=dk(d);const mid=S.plan[key];const meal=mid?MEALS.find(m=>m.id===mid):null;

        ${!isOut&&meal&&!S.manual[key]?`<button class="btn-rm" style="color:var(--faint)" onclick="toggleLock(event,'${key}')" title="Click to lock">🔓</button>`:''}
        ${!isOut&&meal?`<button class="btn-rm" onclick="rmDay(event,'${key}')">✕</button>`:''}
        ${isOut?`<button class="btn-rm" onclick="toggleOut(event,'${key}')" title="Click to re-enable">✕</button>`:''}
        </div>
      </div>
      ${isOut
        ?`<div class="dc-out-lbl"><span style="font-size:20px">🍽</span><span>Eating out</span></div>`
        :meal
          ?`<div class="dmeal"><div class="dmeal-name">${meal.emoji||''} ${meal.name}</div>
            <div class="dmeal-bdgs"><span class="bdg bdg-t">⏱${meal.t}m</span><span class="bdg bdg-${getMealCat(meal)==='$$$'?'high':getMealCat(meal)==='$$'?'mid':'low'}">${getMealCat(meal)}</span></div>
            ${getNutriTags(meal)}
          </div>`
          :`<div class="dempty">+</div>`
      }
    </div>`;

function rmDay(ev,key){ev.stopPropagation();delete S.plan[key];delete S.manual[key];save();renderWeek();if(S.tab==='l')renderList()}
function toggleOut(ev,key){if(ev)ev.stopPropagation();if(S.out[key]){delete S.out[key];}else{S.out[key]=true;delete S.plan[key];delete S.manual[key];}save();renderWeek();if(S.tab==='l')renderList();}
function toggleLock(ev,key){ev.stopPropagation();S.manual[key]=!S.manual[key];if(!S.manual[key])delete S.manual[key];save();renderWeek();}
function chgWeek(dir){S.wk+=dir;renderWeek()}

function clearWeek(){
  const dates=wkDates(S.wk);
  dates.forEach(d=>{
    delete S.plan[dk(d)];
    delete S.manual[dk(d)];
    delete S.out[dk(d)];
  });
  save();renderWeek();showToast('Week cleared');
}
function autoFill(){
  const dates=wkDates(S.wk);
  const used=new Set();
  // Pre-load manually chosen meals so algo never repeats them
  dates.forEach(d=>{if(S.manual[dk(d)]&&S.plan[dk(d)])used.add(S.plan[dk(d)]);});

  const PASTA_IDS=MEALS.filter(m=>m.name.toLowerCase().includes('pasta')).map(m=>m.id);

  function scoreMeal(m, dateKey){
    let sc=m.y;
    // Recency penalty
    const ds=daysSince(lastCookedDate(m.id)||S.lc[m.id]);
    if(ds<7)sc-=3;
    else if(ds<14)sc-=1;

    // Complexity penalty on weekdays (Mon-Thu = dow 1-4)
    const dow=new Date(dateKey+'T12:00:00').getDay(); // 0=Sun,1=Mon...
    const isWeekday=dow>=1&&dow<=4;
    if(isWeekday){
      if(m.cx===5)sc-=4;
      else if(m.cx===4)sc-=1.5;
    }
    // Monthly limit: sushi once per calendar month
    if(m.name==='Sushi'&&dateKey){
      const targetMonth=dateKey.slice(0,7);
      const usedThisMonth=Object.entries(S.plan).some(([d,id])=>
        id===m.id&&d.slice(0,7)===targetMonth&&d!==dateKey
      );
      if(usedThisMonth)sc-=999;
    }
    sc+=Math.random()*1.8;
    return sc;
  }

  function pickBest(pool, dateKey=''){
    const avail=pool.filter(m=>!used.has(m.id));
    if(!avail.length)return null;
    return avail.map(m=>({m,sc:scoreMeal(m,dateKey)})).sort((a,b)=>b.sc-a.sc)[0].m;
  }

  const WEEKLY_BUDGET = 90;
  const keys=dates.map(d=>dk(d));

  // Reset plan for this week — only clear algo-suggested days, keep manual ones
  keys.forEach(key=>{if(!S.manual[key])delete S.plan[key];});

  function weeklyTotal(){
    return keys.reduce((sum,key)=>{
      const m=MEALS.find(x=>x.id===S.plan[key]);
      return sum+(m?getMealPrice(m):0);
    },0);
  }

  function budgetRemaining(slotsLeft){
    // Budget left divided by remaining unfilled slots = max per slot
    return (WEEKLY_BUDGET - weeklyTotal()) / slotsLeft;
  }

  function pickBestWithBudget(pool, dateKey, maxPrice){
    // Filter by budget if we have a constraint, but keep top scorer if nothing fits
    const affordable=pool.filter(m=>!used.has(m.id)&&(getMealPrice(m)||0)<=maxPrice);
    const fallback=pool.filter(m=>!used.has(m.id));
    const candidates=affordable.length?affordable:fallback;
    if(!candidates.length)return null;
    return candidates.map(m=>({m,sc:scoreMeal(m,dateKey)})).sort((a,b)=>b.sc-a.sc)[0].m;
  }

  // Step 1: guarantee 2 pasta slots on random FREE days
  const freeKeys=[...keys].filter(k=>!S.manual[k]).sort(()=>Math.random()-.5);
  const pastaSlots=freeKeys.slice(0,2);
  let slotsLeft=freeKeys.length;
  const freeNonOutKeys=freeKeys.filter(k=>!S.out[k]);
  pastaSlots.forEach(key=>{
    const maxP=budgetRemaining(slotsLeft);
    const pasta=pickBestWithBudget(MEALS.filter(m=>PASTA_IDS.includes(m.id)),key,maxP);
    if(pasta){S.plan[key]=pasta.id;used.add(pasta.id);slotsLeft--;}
  });

  // Step 2: fill remaining days respecting budget (skip manual)
  keys.forEach(key=>{
    if(S.out[key])return; // eating out
    if(S.plan[key])return; // already filled (manual or pasta slot)
    const maxP=budgetRemaining(slotsLeft);
    const best=pickBestWithBudget(MEALS,key,maxP);
    if(best){S.plan[key]=best.id;used.add(best.id);slotsLeft--;}
  });

  const total=weeklyTotal();
  const overBudget=total>WEEKLY_BUDGET;
  save();renderWeek();
  showToast(overBudget
    ? `⚠ €${total.toFixed(0)} — slightly over €${WEEKLY_BUDGET} budget`
    : `✦ Week suggested · €${total.toFixed(0)} / €${WEEKLY_BUDGET}`
  );
}

/* ---- MODAL ---- */
function openDayMod(key){
  S.pendDay=key;S.mf={t:'all',c:'all'};
  const d=new Date(key+'T12:00:00');const di=(d.getDay()+6)%7;
  document.getElementById('mtitle').textContent=`${DFULL[di]} ${d.getDate()} de ${d.toLocaleDateString('en-GB',{month:'long'})}`;
  renderMFbar();renderMlist();
  document.getElementById('moverlay').classList.add('open');
}
function renderMFbar(){
  const b=document.getElementById('mfbar');
  const tF=[{k:'all',l:'All'},{k:'q',l:'≤ 20min'},{k:'m',l:'≤ 30min'}];
  const cF=[{k:'$',l:'€'},{k:'$$',l:'€€'},{k:'$$$',l:'€€€'}];
  b.innerHTML=tF.map(f=>`<button class="chip${S.mf.t===f.k?' on':''}" onclick="setMF('t','${f.k}')">${f.l}</button>`).join('')
    +`<span style="flex:1"></span>`
    +cF.map(f=>`<button class="chip${S.mf.c===f.k?' on':''}" onclick="setMF('c','${f.k}')">${f.l}</button>`).join('');
}
function setMF(k,v){if(k==='c'&&S.mf.c===v)S.mf.c='all';else S.mf[k]=v;renderMFbar();renderMlist()}
function renderMlist(){
  const dates=wkDates(S.wk);
  const usedWk=new Set(dates.map(d=>dk(d)!==S.pendDay?S.plan[dk(d)]:null).filter(Boolean));
  let meals=MEALS.filter(m=>{
    if(S.mf.t==='q'&&m.t>20)return false;
    if(S.mf.t==='m'&&m.t>30)return false;
    if(S.mf.c!=='all'&&getMealCat(m)!==S.mf.c)return false;
    return true;
  }).sort((a,b)=>{
    const ai=usedWk.has(a.id)?1:0,bi=usedWk.has(b.id)?1:0;
    if(ai!==bi)return ai-bi;
    return daysSince(S.lc[b.id])-daysSince(S.lc[a.id]);
  });
  const cur=S.plan[S.pendDay];
  document.getElementById('mlist').innerHTML=meals.map(m=>{
    const ds=daysSince(lastCookedDate(m.id)||S.lc[m.id]);
    const dotCls=ds<7?'dot-mid':ds<9999?'dot-new':'dot-old';
    const inWk=usedWk.has(m.id);
    return`<div class="mitem${cur===m.id?' sel':''}" onclick="selMeal(${m.id})">
      <div class="dot ${dotCls}" title="${ds<9999?'Last cooked '+ds+' days ago':'Never cooked'}"></div>
      <div style="flex:1">
        <div class="mitem-name">${m.name}</div>
        ${inWk?`<div class="week-note">already this week</div>`:''}
      </div>
      <div class="mitem-bdgs">
        <span class="bdg bdg-t">⏱${m.t}m</span>
        <span class="bdg bdg-${getMealCat(m)==='$$$'?'high':getMealCat(m)==='$$'?'mid':'low'}">${getMealCat(m)}</span>
        <span style="font-size:12px;color:var(--gold)">★${m.y}</span>
      </div>
    </div>`;
  }).join('');
}
function selMeal(id){
  const meal=MEALS.find(m=>m.id===id);
  S.plan[S.pendDay]=id;
  S.manual[S.pendDay]=true; // user-chosen
  const pd=new Date(S.pendDay+'T12:00:00');
  if(pd<=new Date())S.lc[id]=S.pendDay;
  save();closeMod();renderWeek();
  if(S.tab==='l')renderList();
  showToast(`${meal.name} assigned`);
}
function setEatingOut(){
  if(S.pendDay){toggleOut(null,S.pendDay);closeMod();}
}
function closeMod(ev){
  if(ev&&ev.target!==document.getElementById('moverlay'))return;
  document.getElementById('moverlay').classList.remove('open');
}

function renderList(){

/* ---- CLOUD SYNC ---- */
const AH_PROXY='https://withered-hall-4097.jterrada.workers.dev';
const SYNC_URL = AH_PROXY + '/sync';
let syncTimer = null;
let lastSyncedHash = null; // null = always push on first sync

function stateHash(){
  return JSON.stringify({plan:S.plan,ckd:S.ckd,lc:S.lc,prices:manualPrices});
}

function setSyncStatus(state, msg){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.title = msg;
  el.className = 'sync-dot' + (state ? ' ' + state : '');
}

let cloudLoaded = false;
async function syncToCloud(){
  if(!cloudLoaded) return; // don't push until we've pulled first
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    const payload = stateHash();
    if(payload === lastSyncedHash && lastSyncedHash !== null) return;
    setSyncStatus('syncing', '↑ syncing...');
    try {
      await fetch(SYNC_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          plan: S.plan, ckd: S.ckd, lc: S.lc, manual: S.manual, out: S.out,
          prices: manualPrices,
          updatedAt: Date.now()
        })
      });
      lastSyncedHash = payload;
      setSyncStatus('synced', '✓ synced');
      setTimeout(() => setSyncStatus('', ''), 3000);
    } catch(e) {
      setSyncStatus('error', '✗ offline');
    }
  }, 800); // debounce 800ms
}

async function loadFromCloud(){
  setSyncStatus('syncing', '↓ loading...');
  try {
    const res = await fetch(SYNC_URL);
    if(!res.ok) throw new Error('fetch failed');
    const cloud = await res.json();
    if(!cloud.updatedAt){ cloudLoaded=true; syncToCloud(); setSyncStatus('synced','✓ synced'); return; }

    const localTs = parseInt(localStorage.getItem('cenas_updatedAt')||'0');

    if(cloud.updatedAt > localTs){
      // Cloud is newer — merge carefully
      cloudLoaded = true; // mark as loaded regardless of content
    if(cloud.plan && Object.keys(cloud.plan).length) S.plan = cloud.plan;
      if(cloud.ckd  && Object.keys(cloud.ckd).length)  S.ckd  = cloud.ckd;
      if(cloud.lc   && Object.keys(cloud.lc).length)   S.lc   = cloud.lc;
    if(cloud.manual && Object.keys(cloud.manual).length) Object.assign(S.manual, cloud.manual);
    if(cloud.out && Object.keys(cloud.out).length) Object.assign(S.out, cloud.out);
    // Note: nutrition is local-only — not read from household_state

      // Merge prices: cloud wins per key, but keep local defaults for missing keys
      if(cloud.prices && Object.keys(cloud.prices).length){
        // Start from current manualPrices (which has defaults), overlay cloud values
        Object.assign(manualPrices, cloud.prices);
        localStorage.setItem('cenas_prices', JSON.stringify(manualPrices));
      }

      localStorage.setItem('cenas2', JSON.stringify({plan:S.plan,ckd:S.ckd,lc:S.lc}));
      localStorage.setItem('cenas_updatedAt', cloud.updatedAt);
      if(S.tab==='s') renderWeek();
      if(S.tab==='l') renderList();
      if(S.tab==='r') renderGrid();
      if(S.tab==='p') renderPrices();
      if(S.tab==='n') renderNutri();
    }
    lastSyncedHash = stateHash();
    localStorage.setItem('cenas_lastPulled', Date.now());
    cloudLoaded = true;
    setSyncStatus('synced','✓ synced');
    setTimeout(()=>setSyncStatus('',''),3000);
  } catch(e) {
    cloudLoaded = true; // allow syncing even if offline
    setSyncStatus('error','✗ offline');
  }
}

function renderCal(){
  const lbl=document.getElementById('calMonthLbl');
  lbl.textContent=new Date(calYear,calMonth,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const grid=document.getElementById('calGrid');
  const today=dk(new Date());

  // First day of month, adjusted to Mon=0
  const first=new Date(calYear,calMonth,1);
  const startDow=(first.getDay()+6)%7; // Mon=0
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  const cells=[];
  // Previous month padding
  for(let i=startDow-1;i>=0;i--){
    cells.push({day:daysInPrev-i,month:calMonth-1,year:calYear,other:true});
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    cells.push({day:d,month:calMonth,year:calYear,other:false});
  }
  // Next month padding to fill 6 rows
  let next=1;
  while(cells.length%7!==0)cells.push({day:next++,month:calMonth+1,year:calYear,other:true});

  grid.innerHTML=cells.map(({day,month,year,other})=>{
    const m=((month%12)+12)%12;
    const y=month<0?year-1:month>11?year+1:year;
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const mealId=S.plan[key];
    const meal=mealId?MEALS.find(x=>x.id===mealId):null;
    const isToday=key===today;
    return`<div class="cal-day${other?' other-month':''}${isToday?' today':''}${meal?' has-meal':''}" onclick="calDayClick('${key}')">

      ${meal?`<span class="cal-meal-chip">${meal.emoji||''} ${meal.name}</span>`:`<div class="cal-empty-dot"></div>`}
    </div>`;
  }).join('');

/* ---- TODAY WIDGET ---- */
function suggestForToday(){
  const todayKey=dk(new Date());
  // Meals used in last 7 days
  const recentIds=new Set(
    Object.entries(S.plan)
      .filter(([d,])=>daysSince(d)<8)
      .map(([,id])=>id)
  );
  return MEALS.map(m=>{
    const lastD=lastCookedDate(m.id)||S.lc[m.id];
    const days=daysSince(lastD);
    let score=m.y;
    if(recentIds.has(m.id))score-=5;
    if(days<7)score-=4;
    else if(days<14)score-=2;
    else if(days>30)score+=1;
    score+=Math.random()*.5;
    return{m,score};
  }).sort((a,b)=>b.score-a.score)[0].m;
}

/* ---- NUTRITION HELPERS ---- */
function calcDailyTotals(dayData, dinner){
  const tot={kcal:0,protein:0,carbs:0,fat:0};
  MEAL_SLOTS.forEach(({key})=>{
    const m=dayData[key]||{};
    tot.kcal+=(m.kcal||0);tot.protein+=(m.protein||0);tot.carbs+=(m.carbs||0);tot.fat+=(m.fat||0);
  });
  if(dinner?.nutrition){
    tot.kcal+=dinner.nutrition.kcal;tot.protein+=dinner.nutrition.protein;
    tot.carbs+=dinner.nutrition.carbs;tot.fat+=dinner.nutrition.fat;
  }
  return tot;
}

function calcDailyScore(totals){
  if(totals.kcal<200)return 0;
  let s=0;
  // Calories: 25 pts — target 2600–3000
  if(totals.kcal>=2600&&totals.kcal<=3000)s+=25;
  else if(totals.kcal>=2200&&totals.kcal<=3400)s+=12;
  // Protein: 35 pts — target 130–155g (priority)
  if(totals.protein>=130&&totals.protein<=155)s+=35;
  else if(totals.protein>=110&&totals.protein<=175)s+=17;
  // Carbs: 20 pts — target 250–350g
  if(totals.carbs>=250&&totals.carbs<=350)s+=20;
  else if(totals.carbs>=200&&totals.carbs<=420)s+=10;
  // Fat: 20 pts — target 60–82g
  if(totals.fat>=60&&totals.fat<=82)s+=20;
  else if(totals.fat>=45&&totals.fat<=105)s+=10;
  return s;
}

function getDayGrade(score){
  if(score===0)return{letter:'—',cls:'grade-none'};
  if(score>=90)return{letter:'S',cls:'grade-s'};
  if(score>=75)return{letter:'A',cls:'grade-a'};
  if(score>=55)return{letter:'B',cls:'grade-b'};
  if(score>=38)return{letter:'C',cls:'grade-c'};
  if(score>=20)return{letter:'D',cls:'grade-d'};
  return{letter:'F',cls:'grade-f'};
}

function dayIsLogged(key){
  const dayData=S.nutrition?.[key]||{};
  const dinnerId=S.plan[key];
  const dinner=dinnerId?MEALS.find(m=>m.id===dinnerId):null;
  const totals=calcDailyTotals(dayData,dinner);
  const manualFilled=MEAL_SLOTS.filter(s=>(dayData[s.key]?.kcal||0)>0).length;
  return totals.kcal>=800||manualFilled>=2;
}

function calcStreak(){
  let streak=0;
  const today=dk(new Date());
  const d=new Date();
  d.setDate(d.getDate()-1);
  for(let i=0;i<730;i++){
    const key=dk(d);
    if(!dayIsLogged(key))break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  if(dayIsLogged(today))streak++;
  return streak;
}

function makeSVGRing(val,max,color,r,sw,size){
  const cx=size/2;
  const circ=(2*Math.PI*r).toFixed(2);
  const pct=max>0?Math.min(val/max,1):0;
  const offset=(circ*(1-pct)).toFixed(2);
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg);display:block;overflow:visible">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      style="transition:stroke-dashoffset .55s ease"/>
  </svg>`;
}

function getMacroColor(val,low,high){
  if(val>=low&&val<=high)return'var(--sage)';
  if(val>=low*.78&&val<=high*1.28)return'var(--gold)';
  return'var(--terra)';
}

/* ---- RENDER: PROGRESS CARD ---- */
function renderNutriProgress(totals){
  const{kcal,protein,carbs,fat}=totals;
  const score=calcDailyScore(totals);
  const grade=getDayGrade(score);
  const kcalColor=kcal===0?'var(--faint)':getMacroColor(kcal,2600,3000);

  // Main ring: r=50, size=120
  const kcalRing=makeSVGRing(kcal,3200,kcalColor,50,9,120);

  // Remaining label
  let remainHTML;
  if(kcal===0)remainHTML=`<span style="color:var(--faint)">— to go</span>`;
  else if(kcal>3000)remainHTML=`<span style="color:var(--terra)">+${kcal-2800} over</span>`;
  else if(kcal>=2600)remainHTML=`<span style="color:var(--sage)">On target ✓</span>`;
  else remainHTML=`<span style="color:var(--gold)">${2800-kcal} to go</span>`;

  // Macro rows
  const macros=[
    {label:'Protein',val:protein,target:140,low:130,high:155,unit:'g'},
    {label:'Carbs',  val:carbs,  target:300,low:250,high:350,unit:'g'},
    {label:'Fat',    val:fat,    target:70, low:60, high:82, unit:'g'},
  ];
  const macroRows=macros.map(m=>{
    const color=m.val===0?'var(--faint)':getMacroColor(m.val,m.low,m.high);
    const ring=makeSVGRing(m.val,m.target*1.2,color,17,4,44);
    const diff=m.target-m.val;
    const sub=m.val===0?`${m.target}${m.unit} target`:diff>0?`${diff}${m.unit} to go`:`+${-diff}${m.unit} over`;
    return`<div class="macro-ring-row">
      <div class="macro-mini-ring">${ring}<div class="macro-mini-center" style="color:${color}">${m.val}</div></div>
      <div class="macro-ring-info">
        <div class="macro-ring-name">${m.label}</div>
        <div class="macro-ring-val" style="color:${color}">${m.val}${m.unit}</div>
        <div class="macro-ring-sub">${sub}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('nutriProgressCard').innerHTML=
    `<div class="nutri-progress-card">
      <div class="nutri-main-ring-wrap">
        ${kcalRing}
        <div class="ring-center">
          <div class="ring-main-val" style="color:${kcalColor}">${kcal}</div>
          <div class="ring-main-lbl">/ 2800 kcal</div>
          <div class="ring-remaining">${remainHTML}</div>
        </div>
        <div class="daily-grade-badge ${grade.cls}">${grade.letter}</div>
      </div>
      <div class="nutri-macro-rings">${macroRows}</div>
    </div>`;
}

/* ---- RENDER: WEEK STRIP ---- */
function renderWeekStrip(){
  const dates=wkDates(0); // always current week
  const todayKey=dk(new Date());
  const DLET=['M','T','W','T','F','S','S'];
  const days=dates.map((d,i)=>{
    const key=dk(d);
    const dayData=S.nutrition?.[key]||{};
    const dinnerId=S.plan[key];
    const dinner=dinnerId?MEALS.find(m=>m.id===dinnerId):null;
    const totals=calcDailyTotals(dayData,dinner);
    const score=calcDailyScore(totals);
    const isToday=key===todayKey;
    const isNav=key===nutriDate&&key!==todayKey;
    let dotCls='s-none';
    if(totals.kcal>=200){
      if(score>=75)dotCls='s-great';
      else if(score>=55)dotCls='s-good';
      else if(score>=30)dotCls='s-ok';
      else dotCls='s-bad';
    }
    const title=score>0?`Score: ${score}/100`:'No data';
    return`<div class="wstrip-day${isToday?' today':''}${isNav?' active-nav':''}" onclick="nutriJump('${key}')" style="cursor:pointer" title="${title}">
      <div class="wstrip-dot ${dotCls}"></div>
      <div class="wstrip-lbl">${DLET[i]}</div>
    </div>`;
  }).join('');
  document.getElementById('nutriWeekStrip').innerHTML=`<div class="week-strip">${days}</div>`;
}

function nutriJump(key){
  nutriDate=key;
  renderNutri();
}

/* ---- RENDER: ACHIEVEMENTS ---- */
function renderAchievements(totals,streak){
  const{protein,kcal,carbs,fat}=totals;
  const score=calcDailyScore(totals);
  const dayData=S.nutrition?.[nutriDate]||{};
  const badges=[];

  if(streak>=7) badges.push({cls:'ach-fire',icon:'🔥',text:`${streak}-day streak`});
  else if(streak>=3) badges.push({cls:'ach-fire',icon:'🔥',text:`${streak} days`});

  if(protein>=130) badges.push({cls:'ach-green',icon:'🎯',text:'Protein goal'});
  if(score>=75) badges.push({cls:'ach-gold',icon:'⚖️',text:'Balanced day'});
  if(score>=90) badges.push({cls:'ach-purple',icon:'🏆',text:'Perfect day'});
  if(protein>=150) badges.push({cls:'ach-green',icon:'💪',text:'High protein'});

  const allLogged=MEAL_SLOTS.every(s=>(dayData[s.key]?.kcal||0)>0);
  if(allLogged&&S.plan[nutriDate]) badges.push({cls:'ach-gold',icon:'⚡',text:'Full log'});

  const el=document.getElementById('nutriAchievements');
  if(!el)return;
  if(!badges.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="nutri-achievements">${badges.map((b,idx)=>
    `<span class="ach ${b.cls}" style="animation-delay:${idx*0.06}s">${b.icon} ${b.text}</span>`
  ).join('')}</div>`;
}

/* ---- RENDER: MAIN NUTRITION VIEW ---- */

function applyPreset(date,meal,preset){
  if(!S.nutrition)S.nutrition={};
  if(!S.nutrition[date])S.nutrition[date]={};
  const cur=S.nutrition[date][meal]||{};
  const picks=[...(cur._picks||[])];
  const idx=picks.indexOf(preset.name);
  if(idx>=0) picks.splice(idx,1); else picks.push(preset.name);
  if(picks.length===0){
    delete S.nutrition[date][meal];
  } else {
    const all=[...MEAL_PRESETS.breakfasts,...MEAL_PRESETS.lunches,...MEAL_PRESETS.snacks];
    const selected=picks.map(n=>all.find(p=>p.name===n)).filter(Boolean);
    const sum=selected.reduce((a,p)=>({kcal:a.kcal+(p.kcal||0),protein:a.protein+(p.protein||0),carbs:a.carbs+(p.carbs||0),fat:a.fat+(p.fat||0)}),{kcal:0,protein:0,carbs:0,fat:0});
    S.nutrition[date][meal]={name:selected.map(p=>p.name).join(' + '),...sum,_picks:picks};
  }
  saveNutriStore();renderNutri();
}
function clearNutriMeal(date,meal){
  if(S.nutrition?.[date]?.[meal])delete S.nutrition[date][meal];
  saveNutriStore();renderNutri();
}
function saveNutriField(meal,field,val){
  if(!S.nutrition)S.nutrition={};
  if(!S.nutrition[nutriDate])S.nutrition[nutriDate]={};
  if(!S.nutrition[nutriDate][meal])S.nutrition[nutriDate][meal]={};
  S.nutrition[nutriDate][meal][field]=val;
  saveNutriStore();
  // Lightweight update — only refresh rings + achievements without re-rendering all cards
  const dayData=S.nutrition[nutriDate]||{};
  const dinner=S.plan[nutriDate]?MEALS.find(m=>m.id===S.plan[nutriDate]):null;
  const totals=calcDailyTotals(dayData,dinner);
  renderNutriProgress(totals);
  renderWeekStrip();
  renderAchievements(totals,calcStreak());
}

function saveNutriStore(){
  localStorage.setItem('cenas_nutrition',JSON.stringify(S.nutrition||{}));
  maybeDailyBackup(); // once per day, silent
}

function loadNutri(){
  try{const d=localStorage.getItem('cenas_nutrition');if(d)S.nutrition=JSON.parse(d);}catch(e){}
  if(!S.nutrition)S.nutrition={};
}

/* ---- NUTRITION BACKUP (local-only with daily cloud backup) ---- */
async function maybeDailyBackup(){
  const last=parseInt(localStorage.getItem('cenas_nutrition_lastBackup')||'0');
  if(Date.now()-last<86400000)return; // less than 24h ago — skip
  try{
    const payload=JSON.stringify({nutrition:S.nutrition||{},backedUpAt:Date.now()});
    const res=await fetch(AH_PROXY+'/sync-nutrition',{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
    if(res.ok)localStorage.setItem('cenas_nutrition_lastBackup',Date.now());
  }catch(e){/* silent — it's just a backup */}
}

async function restoreNutritionBackup(){
  const btn=document.getElementById('nutriRestoreBtn');
  if(btn){btn.textContent='Restoring…';btn.disabled=true;}
  try{
    const res=await fetch(AH_PROXY+'/sync-nutrition');
    if(!res.ok)throw new Error();
    const cloud=await res.json();
    if(!cloud.nutrition||!Object.keys(cloud.nutrition).length){
      showToast('No backup found in cloud');
      if(btn){btn.textContent='Restore backup';btn.disabled=false;}
      return;
    }
    // Merge: local wins for keys that exist, cloud fills in the rest
    S.nutrition={...cloud.nutrition,...S.nutrition};
    localStorage.setItem('cenas_nutrition',JSON.stringify(S.nutrition));
    const d=new Date(cloud.backedUpAt);
    const lbl=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    showToast(`Nutrition restored from ${lbl} ✓`);
    renderNutri();
  }catch(e){
    showToast('Restore failed — check connection');
  }finally{
    if(btn){btn.textContent='Restore backup';btn.disabled=false;}
  }
}
